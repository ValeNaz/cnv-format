<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNV Player</title>
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#0a0a14;--surface:#14142a;--border:#2a2a4a;--text:#e8e8f0;--text-dim:#8888a8;--primary:#7B2FF7;--primary-glow:rgba(123,47,247,0.3);--secondary:#00C4B4;--accent:#FF6B6B;--gold:#FFD700;--sidebar-width:180px}
    body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,'Segoe UI',sans-serif;overflow:hidden;height:100vh;width:100vw}
    #loading{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg)}
    #loading .spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
    #loading .label{margin-top:16px;font-size:14px;color:var(--text-dim)}
    #loading .progress-bar{width:200px;height:4px;background:var(--border);border-radius:2px;margin-top:12px;overflow:hidden}
    #loading .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:2px;transition:width .3s ease}
    @keyframes spin{to{transform:rotate(360deg)}}
    #welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center}
    #welcome h1{font-size:3rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    #welcome p{font-size:1.1rem;color:var(--text-dim);margin:8px 0 24px}
    .btn{padding:14px 36px;font-size:1rem;font-weight:600;border:none;border-radius:12px;cursor:pointer;transition:all .2s ease}
    .btn-primary{background:linear-gradient(135deg,var(--primary),#5a1fd0);color:#fff;box-shadow:0 4px 20px var(--primary-glow)}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--primary-glow)}
    .version{font-size:.75rem;color:var(--text-dim);margin-top:16px}
    #presentation{display:none;width:100vw;height:100vh;grid-template-columns:var(--sidebar-width) 1fr;grid-template-rows:1fr auto}
    #presentation.active{display:grid}
    #sidebar{grid-row:1/3;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;padding:12px 8px}
    .thumb-item{width:100%;aspect-ratio:16/9;border-radius:8px;overflow:hidden;cursor:pointer;margin-bottom:8px;border:2px solid transparent;transition:all .2s ease;position:relative;background:var(--bg)}
    .thumb-item:hover{border-color:var(--border)}
    .thumb-item.active{border-color:var(--primary);box-shadow:0 0 12px var(--primary-glow)}
    .thumb-item svg{width:100%;height:100%;display:block}
    .thumb-number{position:absolute;bottom:4px;right:6px;font-size:10px;color:var(--text-dim);background:rgba(0,0,0,.6);padding:1px 6px;border-radius:4px}
    #stage{display:flex;align-items:center;justify-content:center;background:var(--bg);overflow:hidden;position:relative}
    #slide-container{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
    #slide-canvas{max-width:100%;max-height:100%}
    #scene-renderer{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;pointer-events:none}
    #scene-viewport{position:relative;overflow:hidden}
    .scene-element{position:absolute;opacity:0}
    #controls{grid-column:2;display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--surface);border-top:1px solid var(--border);min-height:52px}
    .ctrl-group{display:flex;align-items:center;gap:8px}
    .ctrl-btn{width:36px;height:36px;border:none;border-radius:8px;background:transparent;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:background .15s}
    .ctrl-btn:hover{background:rgba(255,255,255,.08)}
    .ctrl-btn.active{background:var(--primary)}
    .ctrl-btn:disabled{opacity:.3;cursor:default}
    #slide-counter{font-size:13px;color:var(--text-dim);min-width:70px;text-align:center}
    #progress-track{flex:1;height:4px;background:var(--border);border-radius:2px;margin:0 16px;cursor:pointer}
    #progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:2px;transition:width .3s ease}
    #notes-panel{display:none;grid-column:2;background:var(--surface);border-top:1px solid var(--border);padding:12px 20px;max-height:150px;overflow-y:auto}
    #notes-panel.visible{display:block}
    .notes-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:6px}
    .notes-content{font-size:14px;line-height:1.6}
    .slide-transition-fade{animation:slideFadeIn .6s ease forwards}
    .slide-transition-slideLeft{animation:slideFromRight .5s ease forwards}
    .slide-transition-slideRight{animation:slideFromLeft .5s ease forwards}
    .slide-transition-zoomIn{animation:slideZoomIn .7s ease forwards}
    @keyframes slideFadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideFromRight{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}
    @keyframes slideFromLeft{from{transform:translateX(-60px);opacity:0}to{transform:none;opacity:1}}
    @keyframes slideZoomIn{from{transform:scale(.9);opacity:0}to{transform:none;opacity:1}}
    @keyframes elFadeIn{from{opacity:0}to{opacity:1}}
    @keyframes elSlideInLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:none}}
    @keyframes elSlideInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
    @keyframes elScaleIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:none}}
    @keyframes elSlideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
    body.fullscreen #sidebar{display:none}
    body.fullscreen #presentation{grid-template-columns:1fr}
    body.fullscreen #controls{background:rgba(20,20,42,.9)}
    #keyboard-hint{position:fixed;bottom:70px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;font-size:12px;color:var(--text-dim);opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
    #keyboard-hint.show{opacity:1}
    #keyboard-hint kbd{display:inline-block;padding:2px 6px;background:var(--border);border-radius:4px;font-family:monospace;color:var(--text);margin:0 2px}
  </style>
</head>
<body>
  <div id="loading" style="display:none">
    <div class="spinner"></div>
    <div class="label">Loading presentation...</div>
    <div class="progress-bar"><div class="progress-fill" id="load-progress"></div></div>
  </div>
  <div id="welcome">
    <h1>CNV Player</h1>
    <p>Next-generation offline presentations</p>
    <button class="btn btn-primary" id="btn-open">Open .cnv File</button>
    <div class="version">v2.0 MVP</div>
  </div>
  <div id="presentation">
    <div id="sidebar"></div>
    <div id="stage">
      <div id="slide-container">
        <div id="slide-canvas"></div>
        <div id="scene-renderer"><div id="scene-viewport"></div></div>
      </div>
    </div>
    <div id="notes-panel">
      <div class="notes-label">Presenter Notes</div>
      <div class="notes-content" id="notes-content">No notes for this slide.</div>
    </div>
    <div id="controls">
      <div class="ctrl-group">
        <button class="ctrl-btn" id="btn-prev" title="Previous (Left)">&#8249;</button>
        <span id="slide-counter">1 / 1</span>
        <button class="ctrl-btn" id="btn-next" title="Next (Right)">&#8250;</button>
      </div>
      <div id="progress-track"><div id="progress-fill" style="width:0%"></div></div>
      <div class="ctrl-group">
        <button class="ctrl-btn" id="btn-notes" title="Notes (N)">N</button>
        <button class="ctrl-btn" id="btn-fullscreen" title="Fullscreen (F)">F</button>
        <button class="ctrl-btn" id="btn-help" title="Shortcuts (?)">?</button>
      </div>
    </div>
  </div>
  <div id="keyboard-hint">
    <div><kbd>&#8592;</kbd><kbd>&#8594;</kbd> Navigate <kbd>Space</kbd> Next <kbd>F</kbd> Fullscreen</div>
    <div style="margin-top:4px"><kbd>N</kbd> Notes <kbd>Home</kbd> First <kbd>End</kbd> Last <kbd>Esc</kbd> Exit</div>
  </div>
  <script>
    const $=s=>document.querySelector(s);
    const $$=s=>document.querySelectorAll(s);
    let presentation=null,currentSlide=0,notesVisible=false,helpVisible=false,isFullscreen=false;

    $('#btn-open').addEventListener('click',async()=>{
      try{
        if(window.cnvAPI){const r=await window.cnvAPI.openFile();if(r){showLoading();await loadPresentation(r);}}
        else{const input=document.createElement('input');input.type='file';input.accept='.cnv';input.onchange=async e=>{const f=e.target.files[0];if(f){showLoading();await loadPresentation(await f.arrayBuffer());}};input.click();}
      }catch(err){alert('Error: '+err.message);}
    });

    function showLoading(){$('#welcome').style.display='none';$('#loading').style.display='flex';}
    function setLoadProgress(p){$('#load-progress').style.width=p+'%';}

    async function loadPresentation(data){
      try{
        setLoadProgress(20);
        let parsed;
        if(window.cnvAPI&&window.cnvAPI.parseCNV)parsed=await window.cnvAPI.parseCNV(data);
        else parsed=await parseCNVWeb(data);
        setLoadProgress(60);presentation=parsed;buildThumbnails();setLoadProgress(80);
        $('#loading').style.display='none';$('#presentation').classList.add('active');
        goToSlide(0);setLoadProgress(100);
        if(presentation.manifest)document.title=presentation.manifest.title+' - CNV Player';
      }catch(err){alert('Failed: '+err.message);$('#loading').style.display='none';$('#welcome').style.display='flex';}
    }

    async function parseCNVWeb(buf){
      if(typeof JSZip==='undefined')await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
      const zip=await JSZip.loadAsync(buf);
      const manifest=JSON.parse(await zip.file('manifest.json').async('text'));
      const pages=[];
      for(const p of manifest.pages){const svg=await zip.file(p.file).async('text');pages.push({svg,notes:p.notes||'',transition:p.transition||{type:'fade',durationMs:600},elements:p.elements||[]});}
      return{manifest,pages};
    }

    function buildThumbnails(){
      const sb=$('#sidebar');sb.innerHTML='';
      presentation.pages.forEach((page,i)=>{const d=document.createElement('div');d.className='thumb-item'+(i===0?' active':'');d.innerHTML=page.svg+'<span class="thumb-number">'+(i+1)+'</span>';d.addEventListener('click',()=>goToSlide(i));sb.appendChild(d);});
    }

    function goToSlide(index){
      if(!presentation||index<0||index>=presentation.pages.length)return;
      const page=presentation.pages[index];currentSlide=index;
      const trans=page.transition||{type:'fade',durationMs:600};
      const cls='slide-transition-'+(trans.type||'fade');
      const canvas=$('#slide-canvas');canvas.innerHTML=page.svg;canvas.className='';void canvas.offsetWidth;canvas.classList.add(cls);
      $('#slide-counter').textContent=(index+1)+' / '+presentation.pages.length;
      const pct=presentation.pages.length>1?(index/(presentation.pages.length-1))*100:100;
      $('#progress-fill').style.width=pct+'%';
      $$('.thumb-item').forEach((el,i)=>{el.classList.toggle('active',i===index);if(i===index)el.scrollIntoView({block:'nearest',behavior:'smooth'});});
      $('#notes-content').textContent=page.notes||'No notes for this slide.';
      $('#btn-prev').disabled=index===0;$('#btn-next').disabled=index===presentation.pages.length-1;
      animateElements(page.elements);
    }

    function nextSlide(){if(presentation&&currentSlide<presentation.pages.length-1)goToSlide(currentSlide+1);}
    function prevSlide(){if(presentation&&currentSlide>0)goToSlide(currentSlide-1);}

    function animateElements(elements){
      if(!elements||!elements.length)return;
      const vp=$('#scene-viewport');vp.innerHTML='';
      elements.forEach(el=>{
        const d=document.createElement('div');d.className='scene-element';
        d.style.left=(el.x/1920*100)+'%';d.style.top=(el.y/1080*100)+'%';
        d.style.width=(el.w/1920*100)+'%';d.style.height=(el.h/1080*100)+'%';
        if(el.animation){const m={fadeIn:'elFadeIn',slideInLeft:'elSlideInLeft',slideInUp:'elSlideInUp',scaleIn:'elScaleIn',slideInRight:'elSlideInRight'};const n=m[el.animation.type]||'elFadeIn';d.style.animation=n+' '+(el.animation.durationMs||500)+'ms ease '+(el.animation.delayMs||0)+'ms forwards';}
        vp.appendChild(d);
      });
    }

    $('#btn-prev').addEventListener('click',prevSlide);
    $('#btn-next').addEventListener('click',nextSlide);
    $('#btn-notes').addEventListener('click',()=>{notesVisible=!notesVisible;$('#notes-panel').classList.toggle('visible',notesVisible);$('#btn-notes').classList.toggle('active',notesVisible);});
    $('#btn-fullscreen').addEventListener('click',toggleFullscreen);
    $('#btn-help').addEventListener('click',()=>{helpVisible=!helpVisible;$('#keyboard-hint').classList.toggle('show',helpVisible);if(helpVisible)setTimeout(()=>{helpVisible=false;$('#keyboard-hint').classList.remove('show');},4000);});
    $('#progress-track').addEventListener('click',e=>{if(!presentation)return;const r=e.currentTarget.getBoundingClientRect();goToSlide(Math.round((e.clientX-r.left)/r.width*(presentation.pages.length-1)));});

    function toggleFullscreen(){
      if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{});document.body.classList.add('fullscreen');isFullscreen=true;}
      else{document.exitFullscreen().catch(()=>{});document.body.classList.remove('fullscreen');isFullscreen=false;}
    }

    document.addEventListener('keydown',e=>{
      if(!presentation)return;
      switch(e.key){
        case'ArrowRight':case' ':case'PageDown':e.preventDefault();nextSlide();break;
        case'ArrowLeft':case'PageUp':e.preventDefault();prevSlide();break;
        case'Home':e.preventDefault();goToSlide(0);break;
        case'End':e.preventDefault();goToSlide(presentation.pages.length-1);break;
        case'f':case'F':e.preventDefault();toggleFullscreen();break;
        case'n':case'N':e.preventDefault();$('#btn-notes').click();break;
        case'Escape':if(isFullscreen){document.exitFullscreen().catch(()=>{});document.body.classList.remove('fullscreen');isFullscreen=false;}break;
        case'?':$('#btn-help').click();break;
      }
    });

    let touchStartX=0;
    document.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX;},{passive:true});
    document.addEventListener('touchend',e=>{const dx=e.changedTouches[0].screenX-touchStartX;if(Math.abs(dx)>50){dx>0?prevSlide():nextSlide();}},{passive:true});

    if(window.cnvAPI&&window.cnvAPI.onFileLoaded){window.cnvAPI.onFileLoaded(async data=>{showLoading();await loadPresentation(data);});}
    console.log('CNV Player v2.0 initialized');
  </script>
</body>
</html>
